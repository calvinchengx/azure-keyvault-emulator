# The emulator family. entra-emulator issues the tokens; the keyvault and
# fabric emulators validate them against entra's JWKS — the same trust
# relationships as production Azure. Bring up the pair (entra + keyvault) or
# the full trio (add fabric) and run e2e/chain/run.sh's flow against the
# published ports.
services:
  entra-emulator:
    image: ghcr.io/calvinchengx/entra-emulator:latest
    environment:
      ORIGIN_MODE: compat
      PUBLIC_ORIGIN: "https://entra-emulator:8443"
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD", "/usr/local/bin/entra-emulator", "healthcheck"]
      interval: 5s
      timeout: 2s
      retries: 10

  keyvault-emulator:
    image: ghcr.io/calvinchengx/azure-keyvault-emulator:latest
    depends_on:
      entra-emulator:
        condition: service_healthy
    ports:
      - "8444:8444"
    environment:
      # The authority the 401 challenge advertises, and the issuer/JWKS tokens
      # are validated against. 11111111-… is entra's seeded tenant.
      # https://vault.azure.net is a well-known Azure resource in
      # entra-emulator v0.2.1+, so client credentials resolve the vault
      # audience with no resource-app seed step.
      KV_ENTRA_ISSUER: "https://entra-emulator:8443/11111111-1111-1111-1111-111111111111/v2.0"
      KV_ENTRA_TLS_INSECURE: "true"

  # The third member — enables the secret-as-SP-credential chain across all
  # three (see e2e/chain). Start it with `docker compose --profile full up`.
  fabric-emulator:
    image: ghcr.io/calvinchengx/fabric-emulator:latest
    profiles: [full]
    depends_on:
      entra-emulator:
        condition: service_healthy
    ports:
      - "9443:9443"
    environment:
      FABRIC_ENTRA_ISSUER: "https://entra-emulator:8443/11111111-1111-1111-1111-111111111111/v2.0"
      FABRIC_ENTRA_TLS_INSECURE: "true"
