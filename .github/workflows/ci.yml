name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, vet & tests (incl. real Azure SDK e2e vs entra-emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build ./...
      # The server tests start a real entra-emulator in-process; azsecrets +
      # azidentity complete challenge-based auth against it for real.
      - run: go test -coverpkg=./... -coverprofile=cover.out ./...
      - name: Coverage floor (90%)
        run: |
          total=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t < 90) ? 1 : 0 }'

  chain:
    name: Three-emulator secret-as-SP-credential chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      # Installs entra + fabric (go install), builds this emulator, and walks
      # vault secret → managed identity → entra token → fabric — three real
      # processes, all on the production trust relationships.
      - run: ./e2e/chain/run.sh
