name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, vet & tests (incl. real Azure SDK e2e vs entra-emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build ./...
      # The server tests start a real entra-emulator in-process; azsecrets +
      # azidentity complete challenge-based auth against it for real.
      - run: go test -coverpkg=./... -coverprofile=cover.out ./...
      - name: Coverage floor (90%)
        run: |
          total=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t < 90) ? 1 : 0 }'

  portal:
    name: Portal builds from source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter azure-keyvault-emulator-portal test
      - run: pnpm --filter azure-keyvault-emulator-portal build
      # portal/dist is committed (go:embed bakes it into the binary so `go build`
      # / `go install @latest` need no Node). Fail if the committed copy has
      # drifted from a fresh build so it can never go stale.
      - name: Verify committed portal/dist is up to date
        run: |
          changes="$(git status --porcelain -- portal/dist)"
          if [ -n "$changes" ]; then
            echo "::error::portal/dist is stale. Run 'pnpm --filter azure-keyvault-emulator-portal build' and commit portal/dist."
            echo "$changes"
            exit 1
          fi
      # Headless mount smoke: a bundle can build and pass jsdom unit tests yet
      # never mount in a real browser (server-build resolution). Assert the
      # built dist actually renders.
      - run: pnpm --filter azure-keyvault-emulator-portal exec playwright install --with-deps chromium
      - run: pnpm --filter azure-keyvault-emulator-portal smoke

  chain:
    name: Three-emulator secret-as-SP-credential chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Installs entra + fabric (go install), builds this emulator, and walks
      # vault secret → managed identity → entra token → fabric — three real
      # processes, all on the production trust relationships.
      - run: python3 e2e/chain/run.py
